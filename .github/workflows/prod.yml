name: Production Branch

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to redeploy'
        required: true
        type: string

jobs:
  build-docker-image:
    name: 'Build/push Docker image'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.repository == 'relayprotocol/relay-vaults'
    outputs:
      release-tag: ${{ steps.release.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Resolve release commit
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Docker image to use as base name for tags
          images: |
            ghcr.io/relayprotocol/relay-vaults
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.commit.outputs.sha }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TAG=${{ steps.release.outputs.tag }}

  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.repository == 'relayprotocol/relay-vaults'
    needs: [build-docker-image]
    environment: prod
    container:
      image: ghcr.io/unevenlabs/infrastructure/deployer:1.0.3
      credentials:
        username: ${{ secrets.DEVOPSBOT_LOGIN }}
        password: ${{ secrets.DEVOPSBOT_TOKEN }}
    steps:
      - name: Deploy to staging
        run: |
          bash -c "/app/deploy.sh"
        shell: bash
        env:
          ENVIRONMENT: 'stag'
          SERVICE: 'relay-vaults'
          GITHUB_SHA: '${{ needs.build-docker-image.outputs.release-tag }}'
          GITHUB_TOKEN: '${{ secrets.DEVOPSBOT_TOKEN }}'
          DEVOPSBOT_GPG_PRIVATE_KEY: ${{ secrets.DEVOPSBOT_GPG_PRIVATE_KEY }}
      - name: Deploy to production
        run: |
          bash -c "/app/deploy.sh"
        shell: bash
        env:
          ENVIRONMENT: 'prod'
          SERVICE: 'relay-vaults'
          GITHUB_SHA: '${{ needs.build-docker-image.outputs.release-tag }}'
          GITHUB_TOKEN: '${{ secrets.DEVOPSBOT_TOKEN }}'
          DEVOPSBOT_GPG_PRIVATE_KEY: ${{ secrets.DEVOPSBOT_GPG_PRIVATE_KEY }}
